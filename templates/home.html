<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Risk Prediction Dashboard</title>

    <style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e40af);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    overflow-y:auto;
}

.container{
    width:100%;
    max-width:1100px;
    background:#fff;
    border-radius:20px;
    padding:25px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:15px;
}

.header h1{
    font-size:30px;
    color:#0f172a;
    margin-bottom:5px;
}

.header p{
    font-size:13px;
    color:#64748b;
}

form{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    font-size:13px;
    margin-bottom:6px;
    font-weight:600;
}

.field input{
    padding:10px;
    border:2px solid #e2e8f0;
    border-radius:10px;
    font-size:14px;
}

.field input:focus{
    outline:none;
    border-color:#2563eb;
}

.radio-box{
    padding:12px;
    border:1px solid #e2e8f0;
    border-radius:10px;
    background:#f8fafc;
}

.radio-box span{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
}

.radio-box label{
    display:block;
    margin-top:5px;
}

.submit-btn{
    grid-column:span 3;
}

.submit-btn input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn input:hover{
    background:#1d4ed8;
}

.result{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background:#dcfce7;
    color:#166534;
    text-align:center;
    font-weight:600;
}

.result pre{
    white-space:pre-wrap;
    font-family:'Poppins',sans-serif;
    margin:0;
}

.disclaimer{
    margin-top:12px;
    font-size:11px;
    text-align:center;
    color:#64748b;
}

.footer{
    margin-top:8px;
    text-align:center;
    font-size:11px;
    color:#94a3b8;
}

/* Tablet */

@media (max-width: 768px){

    .container{
        padding:20px;
    }

    .header h1{
        font-size:24px;
    }

    form{
        grid-template-columns:1fr;
        gap:12px;
    }

    .submit-btn{
        grid-column:span 1;
    }

    .radio-box{
        grid-column:span 1 !important;
    }

    .field input{
        font-size:16px;
        padding:12px;
    }

    .submit-btn input{
        font-size:16px;
        padding:14px;
    }
}

/* Mobile */

@media (max-width: 480px){

    body{
        padding:10px;
    }

    .container{
        padding:15px;
        border-radius:15px;
    }

    .header h1{
        font-size:20px;
    }

    .header p{
        font-size:12px;
    }

    .field label,
    .radio-box span{
        font-size:12px;
    }

    .field input{
        font-size:15px;
    }

    .result{
        font-size:14px;
    }

    .disclaimer,
    .footer{
        font-size:10px;
    }
}

</style>
    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1> Diabetes Risk Prediction Dashboard</h1>
        <p>Machine Learning Based Diabetes Assessment System</p>
    </div>

    <form method="POST">

        <div class="field">
            <label>Age</label>
            <input type="number" name="age" placeholder="Age" min="1" required>
        </div>

        <div class="field">
            <label>BMI</label>
            <input type="number" name="bmi" step="0.1" placeholder="BMI" min="1" required>
        </div>

        <div class="field">
            <label>HbA1c (%)</label>
            <input type="number" name="hba1c" step="0.1" placeholder="HbA1c" min="1" required>
        </div>

        <div class="field">
            <label>Fasting Sugar</label>
            <input type="number" name="fs" step="0.1" placeholder="mg/dL" min="1" required>
        </div>

        <div class="radio-box">
            <span>Gender</span>
            <label><input type="radio" name="gender" value="1" required> Female</label>
            <label><input type="radio" name="gender" value="2"> Male</label>
        </div>

        <div class="radio-box">
            <span>High Blood Pressure</span>
            <label><input type="radio" name="tension" value="1" required> No</label>
            <label><input type="radio" name="tension" value="2"> Yes</label>
        </div>

        <div class="radio-box" style="grid-column:span 3;">
            <span>Family History of Diabetes</span>

            <label style="display:inline-block;margin-right:25px;">
                <input type="radio" name="family" value="1" required> No
            </label>

            <label style="display:inline-block;">
                <input type="radio" name="family" value="2"> Yes
            </label>
        </div>

        <div class="submit-btn">
            <input type="submit" value="Predict Diabetes Risk">
        </div>

    </form>

    
    {% if msg %}
    <div class="result">
         <pre>{{ msg }}</pre>
    </div>
        {% endif %}


    <div class="disclaimer">
        Educational purpose only. Not a medical diagnosis.
    </div>

    <div class="footer">
        Developed using Flask, Python & Machine Learning
    </div>

</div>

</body>
</html>
